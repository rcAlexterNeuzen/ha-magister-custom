title: Magister
views:
- title: Rooster & Cijfers
  path: magister
  icon: mdi:school
  cards:
  - type: glance
    title: Vandaag
    entities:
    - entity: sensor.magister_lieke_neuzen_magister_lieke_neuzen
      name: Lessen vandaag
      icon: mdi:school
    - entity: sensor.magister_lieke_neuzen_magister_lieke_neuzen_huiswerk
      name: Huiswerk
      icon: mdi:book-open-page-variant
    - entity: >-
        sensor.magister_lieke_neuzen_magister_lieke_neuzen_roosterwijzigingen
      name: Wijzigingen
      icon: mdi:calendar-alert
    - entity: sensor.magister_lieke_neuzen_magister_lieke_neuzen_cijfers
      name: Laatste cijfer
      icon: mdi:school-outline
  - type: markdown
    title: Volgende les
    content: >
      {% set e = 'sensor.magister_lieke_neuzen_magister_lieke_neuzen_volgende_afspraak' %} {% if states(e) == 'Geen' %}
        Geen komende lessen gevonden.
      {% else %}
        **{{ state_attr(e, 'subject') }}**
        📍 {{ state_attr(e, 'location') | default('–') }}
        🕐 {{ state_attr(e, 'start') }}  →  {{ state_attr(e, 'end') }}
        📝 {{ state_attr(e, 'description') | default('') }}
      {% endif %}
  - type: markdown
    title: Aankomend huiswerk (komende 14 dagen)
    content: |
      {%- set hw = state_attr('sensor.magister_lieke_neuzen_magister_lieke_neuzen_huiswerk', 'huiswerk') -%}
      {%- set today = now().strftime('%Y-%m-%d') -%}
      {%- set deadline = (now() + timedelta(days=14)).strftime('%Y-%m-%d') -%}
      {%- set upcoming = (hw or []) | selectattr('start', 'defined') | selectattr('start', 'ge', today) | selectattr('start', 'le', deadline) | sort(attribute='start') | list -%}
      {%- if upcoming | length == 0 -%}
      _Geen huiswerk de komende 14 dagen._ 🎉
      {%- else -%}
      {%- for h in upcoming -%}
      {%- set meta = '📅 ' ~ h.start[:10] ~ (' · ' ~ h.description if h.description else '') -%}
      📚 **{{ h.subject }}**
      {{ meta }}

      {% endfor -%}
      {%- endif %}
  - type: markdown
    title: Cijfers afgelopen week
    content: |
      {%- set cijfers = state_attr('sensor.magister_lieke_neuzen_magister_lieke_neuzen_cijfers', 'cijfers') -%}
      {%- set week_ago = (now() - timedelta(days=7)).strftime('%Y-%m-%d') -%}
      {%- set recent = (cijfers or []) | selectattr('entered_on', 'defined') | selectattr('entered_on', 'ge', week_ago) | sort(attribute='entered_on', reverse=true) | list -%}
      {%- if recent | length == 0 -%}
      _Geen cijfers de afgelopen week._
      {%- else -%}
      {%- for g in recent -%}
      {%- set n = g.value | float(-1) -%}
      {%- set icon = '🟢' if n >= 5.5 else ('🔴' if n >= 1 else '📝') -%}
      {%- set w = ' _(' ~ g.weight ~ ')_' if g.weight else '' -%}
      {%- set meta = (g.entered_on[:10] if g.entered_on else '') ~ (' · ' ~ g.description if g.description else '') -%}
      {{ icon }} **{{ g.subject }}** — **{{ g.value }}**{{ w }}
      {{ meta }}

      {% endfor -%}
      {%- endif %}
  - type: markdown
    title: Recente cijfers (laatste 10)
    content: |
      {%- set cijfers = state_attr('sensor.magister_lieke_neuzen_magister_lieke_neuzen_cijfers', 'cijfers') -%}
      {%- set items = (cijfers or [])[:10] -%}
      {%- if items | length == 0 -%}
      _Geen cijfers beschikbaar._
      {%- else -%}
      {%- for g in items -%}
      {%- set n = g.value | float(-1) -%}
      {%- set icon = '🟢' if n >= 5.5 else ('🔴' if n >= 1 else '📝') -%}
      {%- set w = ' _(' ~ g.weight ~ ')_' if g.weight else '' -%}
      {%- set meta = (g.entered_on[:10] if g.entered_on else '') ~ (' · ' ~ g.description if g.description else '') -%}
      {{ icon }} **{{ g.subject }}** — **{{ g.value }}**{{ w }}
      {{ meta }}

      {% endfor -%}
      {%- endif %}
  - type: markdown
    title: Roosterwijzigingen
    content: |
      {%- set wijzigingen = state_attr('sensor.magister_lieke_neuzen_magister_lieke_neuzen_roosterwijzigingen', 'wijzigingen') -%}
      {%- set items = (wijzigingen or []) | sort(attribute='start') -%}
      {%- if items | length == 0 -%}
      _Geen roosterwijzigingen._ ✅
      {%- else -%}
      {%- for w in items -%}
      {%- set d = '📅 ' ~ (w.start[:10] if w.start else '–') -%}
      {%- set loc = ' · 📍 ' ~ w.location if w.location else '' -%}
      {%- set desc = ' · ' ~ w.description if w.description else '' -%}
      ⚠️ **{{ w.subject }}**
      {{ d }}{{ loc }}{{ desc }}

      {% endfor -%}
      {%- endif %}
  - initial_view: dayGridDay
    type: calendar
    title: Rooster
    entities:
    - calendar.magister_lieke_neuzen_magister_lieke_neuzen_rooster
